<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Information Systems MCQ Quiz</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #182230;
      --muted: #5f6b7a;
      --primary: #1d4ed8;
      --primary-dark: #153eaa;
      --success: #166534;
      --success-bg: #dcfce7;
      --danger: #991b1b;
      --danger-bg: #fee2e2;
      --border: #d8e0ea;
      --focus: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f8fafc 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      line-height: 1.5;
    }

    .quiz-shell {
      width: 100%;
      max-width: 900px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    header {
      padding: 24px;
      background: #0f172a;
      color: #ffffff;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 3vw, 2rem);
    }

    header p {
      margin: 0;
      color: #cbd5e1;
      font-size: 0.98rem;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      padding: 18px 24px 0;
    }

    .meta {
      color: var(--muted);
      font-weight: 700;
    }

    .score-pill {
      background: #e0ecff;
      color: #173b85;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .progress-wrap {
      margin: 14px 24px 0;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #d1d5db;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #16a34a);
      transition: width 280ms ease;
    }

    main {
      padding: 24px;
    }

    .question-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      background: #ffffff;
    }

    .topic {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 800;
      color: #1e3a8a;
      background: #dbeafe;
      padding: 5px 9px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .question-text {
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      font-weight: 800;
      margin: 0 0 18px;
      white-space: pre-wrap;
    }

    .answers {
      display: grid;
      gap: 12px;
    }

    button {
      font: inherit;
    }

    .answer-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: #f8fafc;
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      white-space: pre-wrap;
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--primary);
      background: #eff6ff;
    }

    .answer-btn:focus-visible,
    .nav-btn:focus-visible,
    .restart-btn:focus-visible {
      outline: 4px solid var(--focus);
      outline-offset: 3px;
    }

    .answer-btn.correct {
      border-color: var(--success);
      background: var(--success-bg);
      color: var(--success);
    }

    .answer-btn.incorrect {
      border-color: var(--danger);
      background: var(--danger-bg);
      color: var(--danger);
    }

    .answer-btn:disabled {
      cursor: not-allowed;
      opacity: 0.95;
    }

    .feedback {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      border-left: 6px solid var(--primary);
      background: #f1f5f9;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback strong {
      display: block;
      margin-bottom: 6px;
    }

    .nav-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
      gap: 12px;
    }

    .nav-btn,
    .restart-btn {
      border: none;
      background: var(--primary);
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .nav-btn:hover,
    .restart-btn:hover {
      background: var(--primary-dark);
    }

    .nav-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .result-card {
      text-align: center;
      padding: 30px 22px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #ffffff;
    }

    .result-card h2 {
      font-size: clamp(1.5rem, 4vw, 2.3rem);
      margin: 0 0 10px;
    }

    .big-score {
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      font-weight: 900;
      color: var(--primary);
      margin: 14px 0;
    }

    .pass {
      color: var(--success);
      font-weight: 900;
    }

    .fail {
      color: var(--danger);
      font-weight: 900;
    }

    .review-list {
      margin-top: 22px;
      text-align: left;
      display: grid;
      gap: 10px;
    }

    .review-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #f8fafc;
    }

    .review-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .sr-only {
      position: absolute;
      left: -10000px;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      header,
      main,
      .top-row {
        padding-left: 16px;
        padding-right: 16px;
      }

      .progress-wrap {
        margin-left: 16px;
        margin-right: 16px;
      }

      .question-card {
        padding: 16px;
      }

      .answer-btn {
        padding: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="quiz-shell">
    <header>
      <h1>Marketing Information Systems MCQ Quiz</h1>
      <p>Interactive revision quiz based on Year 1 MIS exam topics.</p>
    </header>

    <div class="top-row" aria-live="polite">
      <div class="meta" id="questionCounter">Question 1 of 1</div>
      <div class="score-pill" id="scoreTracker">Score: 0</div>
    </div>

    <div class="progress-wrap" aria-label="Quiz progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <main id="app"></main>
  </div>

  <script>
    /*
      HOW TO EDIT THIS QUIZ
      ---------------------
      Add, remove, or edit question objects in the quizData array below.

      Each question needs:
      - topic: short label shown above the question
      - question: the question text
      - options: exactly four answer choices unless you intentionally want a different number
      - correct: the exact text of the correct option
      - explanation: short feedback shown after answering

      The answer order is randomized automatically, while the correct answer remains mapped.
    */

    const quizData = [
      {
        topic: "Data, Information and Knowledge",
        question: "The number of cookies downloaded from a page on a website in one day is best classified as:",
        options: ["Data", "Information", "Knowledge", "A strategic decision"],
        correct: "Information",
        explanation: "It is a processed count summarising raw website events over a defined period, so it is information rather than a single raw fact."
      },
      {
        topic: "Data, Information and Knowledge",
        question: "A cookie downloaded from a webpage onto a visitor’s computer is best classified as:",
        options: ["Data", "Information", "Knowledge", "A management report"],
        correct: "Data",
        explanation: "The individual cookie event is a raw fact captured by the system before being processed into totals or reports."
      },
      {
        topic: "Data, Information and Knowledge",
        question: "The number of staff required to handle requests from a website is best classified as:",
        options: ["Data", "Information", "Knowledge", "A primary key"],
        correct: "Knowledge",
        explanation: "This uses information about demand to support an operational staffing decision, so it is knowledge applied to action."
      },
      {
        topic: "Data, Information and Knowledge",
        question: "The business card of a contact met at a sales conference is best classified as:",
        options: ["Data", "Information", "Knowledge", "A transaction processing stage"],
        correct: "Data",
        explanation: "A business card contains raw facts such as name, job title, company, phone number and email address."
      },
      {
        topic: "Data, Information and Knowledge",
        question: "The total value of sales in one week for a business is best classified as:",
        options: ["Data", "Information", "Knowledge", "Unstructured data only"],
        correct: "Information",
        explanation: "Weekly sales total is raw sales data processed into a meaningful summary."
      },
      {
        topic: "Data, Information and Knowledge",
        question: "The weekly sales target for one sales representative is best classified as:",
        options: ["Data", "Information", "Knowledge", "A telecommunications channel"],
        correct: "Knowledge",
        explanation: "A target is set by applying business judgement and previous information to guide future performance."
      },
      {
        topic: "Data, Information and Knowledge",
        question: "The commission received by one sales representative at the end of a month is best classified as:",
        options: ["Data", "Information", "Knowledge", "A many-to-many relationship"],
        correct: "Information",
        explanation: "Commission is calculated from wage, sales and commission rules, so it is processed information."
      },
      {
        topic: "Data, Information and Knowledge",
        question: "The amount of an item to order for next week is best classified as:",
        options: ["Data", "Information", "Knowledge", "A homepage"],
        correct: "Knowledge",
        explanation: "An order quantity applies information about demand, stock and targets to make a decision."
      },
      {
        topic: "Data Processing Cycle",
        question: "Which sequence best represents the data processing cycle?",
        options: [
          "Input, processing, output, storage/feedback",
          "Formatting, printing, deleting, archiving",
          "Homepage, hyperlink, stylesheet, browser",
          "Primary key, query, form, report only"
        ],
        correct: "Input, processing, output, storage/feedback",
        explanation: "The standard cycle begins with input data, processes it, produces output and stores or feeds back results for future use."
      },
      {
        topic: "Decision Types",
        question: "Which option correctly matches decision types with typical management levels?",
        options: [
          "Structured: operational; semi-structured: tactical; unstructured: strategic",
          "Structured: strategic; semi-structured: operational; unstructured: tactical",
          "Structured: tactical only; semi-structured: strategic only; unstructured: operational only",
          "All decision types belong only to operational management"
        ],
        correct: "Structured: operational; semi-structured: tactical; unstructured: strategic",
        explanation: "Routine structured decisions are common at operational level, semi-structured decisions at tactical level and novel unstructured decisions at strategic level."
      },
      {
        topic: "Decision Types",
        question: "Which is the best example of an unstructured decision?",
        options: [
          "Choosing whether to enter a new international market",
          "Calculating commission using a fixed formula",
          "Printing a weekly sales report",
          "Looking up a staff member by Staff ID"
        ],
        correct: "Choosing whether to enter a new international market",
        explanation: "Entering a new market is complex, uncertain and non-routine, making it an unstructured strategic decision."
      },
      {
        topic: "Competitive Advantage",
        question: "Which set best represents four common ways information systems can help create competitive advantage?",
        options: [
          "Cost leadership, differentiation, innovation and customer/supplier intimacy",
          "Deleting records, hiding reports, reducing backups and avoiding training",
          "Only buying faster printers and larger monitors",
          "Using a homepage, hyperlink, CSS rule and spreadsheet cell"
        ],
        correct: "Cost leadership, differentiation, innovation and customer/supplier intimacy",
        explanation: "Information systems can reduce costs, support differentiated services, enable new products and strengthen relationships with customers and suppliers."
      },
      {
        topic: "Transaction Processing Systems",
        question: "Which activity is a typical function of a Transaction Processing System?",
        options: [
          "Recording sales, payments, bookings or payroll transactions accurately and routinely",
          "Making a one-off decision to acquire a competitor",
          "Designing a brand identity from scratch",
          "Writing an essay on database theory"
        ],
        correct: "Recording sales, payments, bookings or payroll transactions accurately and routinely",
        explanation: "TPSs handle high-volume, routine business transactions such as sales, orders, payments, bookings and payroll."
      },
      {
        topic: "Transaction Processing Systems",
        question: "Which sequence best describes five stages in a Transaction Processing System?",
        options: [
          "Data entry, validation, processing, storage, output/reporting",
          "Strategy, negotiation, branding, advertising, selling",
          "Sketching, styling, uploading, linking, browsing",
          "Searching, indexing, ranking, advertising, blogging"
        ],
        correct: "Data entry, validation, processing, storage, output/reporting",
        explanation: "A TPS captures transaction data, checks it, processes it, stores it and produces outputs such as receipts or reports."
      },
      {
        topic: "Information Systems Components",
        question: "Which option lists the four information system components required by the exam question?",
        options: [
          "Hardware, software, people and data",
          "Homepage, hyperlink, header and footer",
          "Transport, retailing, supply chain and smart cities",
          "Terminals, routers, clouds and cookies only"
        ],
        correct: "Hardware, software, people and data",
        explanation: "The question specifically asks for the roles of hardware, software, people and data in an information system."
      },
      {
        topic: "Information Systems Components",
        question: "In an information system, which example is software?",
        options: [
          "Microsoft Access used to manage records",
          "A keyboard used to type data",
          "A sales manager using reports",
          "A customer telephone number"
        ],
        correct: "Microsoft Access used to manage records",
        explanation: "Software is the program or application that processes, stores or presents data, such as Access, Excel or a payroll system."
      },
      {
        topic: "Spreadsheet Formulas",
        question: "In the wages spreadsheet, cell I7 contains IF(F7>H7, (F7-H7)*G7, 0). If F7 is €400, H7 is €400 and G7 is 11%, what is the result?",
        options: ["0", "€44.00", "€400.00", "€11.00"],
        correct: "0",
        explanation: "The test F7>H7 is false because €400 is not greater than €400. Therefore the IF statement returns 0."
      },
      {
        topic: "Spreadsheet Formulas",
        question: "What does IF(F7>H7, (F7-H7)*G7, 0) calculate in the wages spreadsheet?",
        options: [
          "Commission on sales above the commission threshold, otherwise zero",
          "Tax on all sales regardless of threshold",
          "Gross wages from wage rate multiplied by hours worked",
          "Net wages after all deductions"
        ],
        correct: "Commission on sales above the commission threshold, otherwise zero",
        explanation: "The formula checks whether sales exceed the threshold. If they do, it calculates commission on the excess; otherwise it returns zero."
      },
      {
        topic: "Spreadsheet Lookup",
        question: "In the Autumn paper, what would VLOOKUP(4, $A$3:$N$8, 4, FALSE) return from the wages table?",
        options: ["35", "James", "€700.00", "€656.94"],
        correct: "35",
        explanation: "The lookup finds Staff no 4, which is James. The fourth column in A:N is Hours worked, and James worked 35 hours."
      },
      {
        topic: "Spreadsheet Lookup",
        question: "In the Summer paper, what would VLOOKUP(6, $A$3:$N$8, 10, FALSE) return from the wages table?",
        options: ["€630.00", "David", "40", "€554.10"],
        correct: "€630.00",
        explanation: "The lookup finds Staff no 6, David. The tenth column in A:N is Total before tax, which is €630.00."
      },
      {
        topic: "Spreadsheet Lookup",
        question: "In VLOOKUP(6, $A$3:$N$8, 10, FALSE), what does FALSE require?",
        options: [
          "An exact match for the lookup value",
          "An approximate match in a sorted table",
          "A search from right to left",
          "A formula that ignores the first column"
        ],
        correct: "An exact match for the lookup value",
        explanation: "FALSE tells VLOOKUP to return a result only where the lookup value exactly matches an item in the first column of the table range."
      },
      {
        topic: "Decision Support Systems",
        question: "Which is the best example of using a spreadsheet as a Decision Support System?",
        options: [
          "Using a pivot table to summarise sales by region and test management decisions",
          "Typing a single name into a blank worksheet",
          "Changing the font colour of a heading",
          "Saving a file without analysing the data"
        ],
        correct: "Using a pivot table to summarise sales by region and test management decisions",
        explanation: "A spreadsheet supports decision making when it analyses data, models outcomes or summarises information for managers."
      },
      {
        topic: "Decision Support Systems",
        question: "Which set contains examples of spreadsheet-based DSS uses mentioned in the exam?",
        options: [
          "Pivot tables, probability calculations and accounting applications",
          "Hyperlinks, homepages and browser bookmarks",
          "Terminals, channels and telecommunications processors",
          "Primary keys, foreign keys and subforms only"
        ],
        correct: "Pivot tables, probability calculations and accounting applications",
        explanation: "The exam explicitly names pivot tables, probability calculations and accounting applications as spreadsheet DSS examples."
      },
      {
        topic: "Internet of Things",
        question: "What does the term Internet of Things mean?",
        options: [
          "Everyday physical objects fitted with sensors, software and connectivity so they can collect and exchange data",
          "A list of websites saved in a browser",
          "A spreadsheet formula used to calculate tax",
          "A database relationship between two tables"
        ],
        correct: "Everyday physical objects fitted with sensors, software and connectivity so they can collect and exchange data",
        explanation: "IoT connects physical devices to networks so they can sense, transmit and sometimes act on data."
      },
      {
        topic: "Internet of Things",
        question: "Which sequence best explains how IoT operates?",
        options: [
          "Sensors collect data, connectivity sends it, systems process it, and users or devices act on it",
          "Users type HTML, CSS formats it, and a browser prints it",
          "A primary key links directly to a foreign key without data collection",
          "A manager deletes data and then creates a homepage"
        ],
        correct: "Sensors collect data, connectivity sends it, systems process it, and users or devices act on it",
        explanation: "IoT systems depend on sensing, communication, processing and response."
      },
      {
        topic: "Internet of Things",
        question: "Which is the best IoT example in transport?",
        options: [
          "GPS and vehicle sensors sending live traffic or fleet data",
          "A printed bus timetable locked in an office",
          "A business card from a sales conference",
          "A spreadsheet cell containing plain text only"
        ],
        correct: "GPS and vehicle sensors sending live traffic or fleet data",
        explanation: "Transport IoT often uses connected vehicles, GPS and sensors to monitor location, traffic, maintenance or routing."
      },
      {
        topic: "Internet of Things",
        question: "Which is the best IoT example in retailing?",
        options: [
          "Smart shelves or RFID tags monitoring stock levels automatically",
          "A paper receipt stored in a drawer",
          "A static poster in a shop window",
          "A one-to-one database relationship"
        ],
        correct: "Smart shelves or RFID tags monitoring stock levels automatically",
        explanation: "Retail IoT can use connected tags, beacons or shelves to track stock and customer activity."
      },
      {
        topic: "Internet of Things",
        question: "Which is the best IoT example in health and fitness?",
        options: [
          "A wearable fitness tracker measuring heart rate and steps",
          "A handwritten exercise diary only",
          "A printed network diagram",
          "A local text file with no sensor data"
        ],
        correct: "A wearable fitness tracker measuring heart rate and steps",
        explanation: "Wearables are connected devices that collect health or activity data and transmit it for analysis."
      },
      {
        topic: "Web Design Tools",
        question: "Which statement best distinguishes Notepad++ from Dreamweaver as a web page editor?",
        options: [
          "Notepad++ is mainly a code editor, while Dreamweaver offers more visual web design and site-management features",
          "Notepad++ is a database management system, while Dreamweaver is a payroll system",
          "Notepad++ can only open spreadsheets, while Dreamweaver can only open images",
          "They are identical in purpose and interface"
        ],
        correct: "Notepad++ is mainly a code editor, while Dreamweaver offers more visual web design and site-management features",
        explanation: "Notepad++ is suited to editing code directly. Dreamweaver provides a more integrated web design environment with visual and site tools."
      },
      {
        topic: "Stylesheets",
        question: "What is the main purpose of a stylesheet in web design?",
        options: [
          "To control presentation such as layout, colours, spacing and fonts separately from HTML content",
          "To store staff wage rates in a relational database",
          "To replace all hyperlinks on a website",
          "To calculate commission in a spreadsheet"
        ],
        correct: "To control presentation such as layout, colours, spacing and fonts separately from HTML content",
        explanation: "CSS stylesheets separate design from structure, making web pages easier to maintain and more consistent."
      },
      {
        topic: "Stylesheets",
        question: "Which pair gives two strong reasons for using stylesheets?",
        options: [
          "Consistent formatting across pages and easier maintenance",
          "Exact-match lookup and approximate-match lookup",
          "Primary keys and foreign keys",
          "Data entry and validation only"
        ],
        correct: "Consistent formatting across pages and easier maintenance",
        explanation: "A stylesheet allows many pages to share the same design and lets designers update appearance in one place."
      },
      {
        topic: "CSS Layout",
        question: "For the mobile CSS rule #top {position: absolute; width: 200px; margin-left:50px;} on a 400px wide screen, where does #top begin horizontally?",

        explanation: "The margin-left value moves the absolutely positioned #top element 50 pixels from the left edge."
      },
      {
        topic: "CSS Layout",

          "#main starts 100px from the left, 200px from the top, and extends to the 400px right edge",
          "#main starts at the left edge and is 100px wide",
          "#main must appear above #top",
          "#main is centred with equal margins on both sides"
        ],
        correct: "#main starts 100px from the left, 200px from the top, and extends to the 400px right edge",
        explanation: "A left margin of 100px plus a width of 300px fills the 400px screen width from x=100 to x=400."
      },
      {
        topic: "CSS Layout",
        question: "For the computer-screen CSS rule #top {position: absolute; width: 500px; margin-left:500px;} on a 1000px wide screen, which statement is most accurate?",

          "#top occupies the right half of the screen",
          "#top occupies the left half of the screen",
          "#top is only 100px wide",
          "#top begins at 0px and ends at 500px"

        correct: "#top occupies the right half of the screen",
        explanation: "The element begins 500px from the left and has a width of 500px, so it spans x=500 to x=1000."
      },
      {
        topic: "Web Design Terms",
        question: "In web design, what is a homepage?",
        options: [
          "The main or starting page of a website",
          "A spreadsheet cell that stores a formula",
          "A database field that uniquely identifies each record",
          "A network cable connecting two computers"
        ],
        correct: "The main or starting page of a website",
        explanation: "A homepage is the primary entry page or main page for a website."
      },
      {
        topic: "Web Design Terms",
        question: "In web design, what is a hyperlink?",
        options: [
          "Clickable text or content that takes the user to another page, file, section or resource",
          "A payroll calculation",
          "A physical router in a network",
          "A table’s primary key"
        ],
        correct: "Clickable text or content that takes the user to another page, file, section or resource",
        explanation: "Hyperlinks connect web resources and allow users to navigate between pages or locations."
      },
      {
        topic: "Networks",
        question: "Which option lists the five network components named in the Autumn exam?",
        options: [
          "Terminals, computers, telecommunications processors, telecommunications channels and software",
          "Hardware, software, people, data and knowledge",
          "Input, processing, output, storage and feedback",
          "Transport, retailing, supply chain, fitness and smart cities"
        ],
        correct: "Terminals, computers, telecommunications processors, telecommunications channels and software",
        explanation: "The Autumn paper asks for these five network components and their roles."
      },
      {
        topic: "Networks",
        question: "In a network, what is a telecommunications channel?",
        options: [
          "The medium or path used to carry data, such as fibre, Wi-Fi or mobile networks",
          "The employee who approves payroll",
          "A stylesheet rule for layout",
          "A spreadsheet function for exact matching"
        ],
        correct: "The medium or path used to carry data, such as fibre, Wi-Fi or mobile networks",
        explanation: "Telecommunications channels are the wired or wireless paths through which data travels."
      },
      {
        topic: "OSI Model",
        question: "Which option correctly lists the seven OSI layers from Layer 7 down to Layer 1?",

    const PASS_MARK = 50; // Edit this percentage if you want a different pass mark.

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;
    let userAnswers = [];

    const app = document.getElementById("app");
    const questionCounter = document.getElementById("questionCounter");
    const scoreTracker = document.getElementById("scoreTracker");
    const progressBar = document.getElementById("progressBar");

    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function updateTopBar() {
      const total = quizData.length;
      const current = Math.min(currentQuestionIndex + 1, total);
      questionCounter.textContent = currentQuestionIndex < total
        ? `Question ${current} of ${total}`
        : `Quiz complete`;
      scoreTracker.textContent = `Score: ${score}`;
      progressBar.style.width = `${(currentQuestionIndex / total) * 100}%`;
    }

    function renderQuestion() {
      answered = false;
      updateTopBar();

      const q = quizData[currentQuestionIndex];
      const shuffledOptions = shuffleArray(q.options);

      app.innerHTML = "";

      const section = document.createElement("section");
      section.className = "question-card";
      section.setAttribute("aria-labelledby", "questionText");

      const topic = document.createElement("div");
      topic.className = "topic";
      topic.textContent = q.topic;

      const question = document.createElement("h2");
      question.className = "question-text";
      question.id = "questionText";
      question.textContent = q.question;

      const answers = document.createElement("div");
      answers.className = "answers";
      answers.setAttribute("role", "group");
      answers.setAttribute("aria-label", "Answer choices");

      shuffledOptions.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.type = "button";
        btn.textContent = `${String.fromCharCode(65 + index)}. ${option}`;
        btn.dataset.option = option;
        btn.addEventListener("click", () => selectAnswer(btn, q, answers));
        answers.appendChild(btn);
      });

      const feedback = document.createElement("div");
      feedback.className = "feedback";
      feedback.id = "feedback";
      feedback.setAttribute("aria-live", "polite");

      const nav = document.createElement("div");
      nav.className = "nav-row";

      const nextBtn = document.createElement("button");
      nextBtn.className = "nav-btn";
      nextBtn.type = "button";
      nextBtn.id = "nextBtn";
      nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? "See results" : "Next question";
      nextBtn.disabled = true;
      nextBtn.addEventListener("click", () => {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
          renderQuestion();
        } else {
          renderResults();
        }
      });

      nav.appendChild(nextBtn);

      section.appendChild(topic);
      section.appendChild(question);
      section.appendChild(answers);
      section.appendChild(feedback);
      section.appendChild(nav);
      app.appendChild(section);
    }

    function selectAnswer(button, q, answersContainer) {
      if (answered) return;
      answered = true;

      const selected = button.dataset.option;
      const isCorrect = selected === q.correct;

      if (isCorrect) score++;

      userAnswers.push({
        question: q.question,
        selected,
        correct: q.correct,
        isCorrect
      });

      const allButtons = answersContainer.querySelectorAll(".answer-btn");
      allButtons.forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.option === q.correct) {
          btn.classList.add("correct");
        }
        if (btn === button && !isCorrect) {
          btn.classList.add("incorrect");
        }
      });

      const feedback = document.getElementById("feedback");
      feedback.classList.add("show");
      feedback.innerHTML = `
        <strong>${isCorrect ? "Correct." : "Not quite."}</strong>
        <span>${q.explanation}</span>
      `;

      document.getElementById("nextBtn").disabled = false;
      scoreTracker.textContent = `Score: ${score}`;
      progressBar.style.width = `${((currentQuestionIndex + 1) / quizData.length) * 100}%`;
    }

    function renderResults() {
      updateTopBar();
      progressBar.style.width = "100%";

      const total = quizData.length;
      const percentage = Math.round((score / total) * 100);
      const passed = percentage >= PASS_MARK;

      app.innerHTML = "";

      const result = document.createElement("section");
      result.className = "result-card";

      const heading = document.createElement("h2");
      heading.textContent = "Final Results";

      const bigScore = document.createElement("div");
      bigScore.className = "big-score";
      bigScore.textContent = `${percentage}%`;

      const detail = document.createElement("p");
      detail.innerHTML = `You scored <strong>${score}</strong> out of <strong>${total}</strong>.`;

      const passFail = document.createElement("p");
      passFail.className = passed ? "pass" : "fail";
      passFail.textContent = passed
        ? `Pass — you reached the ${PASS_MARK}% pass mark.`
        : `Fail — review the feedback and try again to reach ${PASS_MARK}%.`;

      const restart = document.createElement("button");
      restart.className = "restart-btn";
      restart.type = "button";
      restart.textContent = "Restart quiz";
      restart.addEventListener("click", restartQuiz);

      const review = document.createElement("div");
      review.className = "review-list";
      review.setAttribute("aria-label", "Answer review");

      userAnswers.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "review-item";
        row.innerHTML = `
          <strong>Q${index + 1}: ${item.isCorrect ? "Correct" : "Incorrect"}</strong>
          <div>Your answer: ${escapeHTML(item.selected)}</div>
          ${item.isCorrect ? "" : `<div>Correct answer: ${escapeHTML(item.correct)}</div>`}
        `;
        review.appendChild(row);
      });

      result.appendChild(heading);
      result.appendChild(bigScore);
      result.appendChild(detail);
      result.appendChild(passFail);
      result.appendChild(restart);
      result.appendChild(review);
      app.appendChild(result);
    }

    function restartQuiz() {
      currentQuestionIndex = 0;
      score = 0;
      answered = false;
      userAnswers = [];
      renderQuestion();
    }

    function escapeHTML(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    renderQuestion();
  </script>
