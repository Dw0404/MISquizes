<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Information Systems MCQ Quiz</title>

  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #182230;
      --muted: #5f6b7a;
      --primary: #1d4ed8;
      --primary-dark: #153eaa;
      --success: #166534;
      --success-bg: #dcfce7;
      --danger: #991b1b;
      --danger-bg: #fee2e2;
      --border: #d8e0ea;
      --focus: #f59e0b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #eef4ff 0%, #f8fafc 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      line-height: 1.5;
    }

    .quiz-shell {
      width: 100%;
      max-width: 950px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    header {
      padding: 24px;
      background: #0f172a;
      color: #ffffff;
    }

    header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 3vw, 2rem);
    }

    header p {
      margin: 0;
      color: #cbd5e1;
      font-size: 0.98rem;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      padding: 18px 24px 0;
    }

    .meta {
      color: var(--muted);
      font-weight: 700;
    }

    .score-pill {
      background: #e0ecff;
      color: #173b85;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .progress-wrap {
      margin: 14px 24px 0;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid #d1d5db;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2563eb, #16a34a);
      transition: width 280ms ease;
    }

    main {
      padding: 24px;
    }

    .question-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      background: #ffffff;
    }

    .topic {
      display: inline-block;
      font-size: 0.82rem;
      font-weight: 800;
      color: #1e3a8a;
      background: #dbeafe;
      padding: 5px 9px;
      border-radius: 999px;
      margin-bottom: 14px;
    }

    .question-text {
      font-size: clamp(1.05rem, 2.4vw, 1.35rem);
      font-weight: 800;
      margin: 0 0 18px;
      white-space: pre-wrap;
    }

    .answers {
      display: grid;
      gap: 12px;
    }

    button {
      font: inherit;
    }

    .answer-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: #f8fafc;
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      white-space: pre-wrap;
    }

    .answer-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: var(--primary);
      background: #eff6ff;
    }

    .answer-btn:focus-visible,
    .nav-btn:focus-visible,
    .restart-btn:focus-visible {
      outline: 4px solid var(--focus);
      outline-offset: 3px;
    }

    .answer-btn.correct {
      border-color: var(--success);
      background: var(--success-bg);
      color: var(--success);
    }

    .answer-btn.incorrect {
      border-color: var(--danger);
      background: var(--danger-bg);
      color: var(--danger);
    }

    .answer-btn:disabled {
      cursor: not-allowed;
      opacity: 0.95;
    }

    .feedback {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      border-left: 6px solid var(--primary);
      background: #f1f5f9;
      display: none;
    }

    .feedback.show {
      display: block;
    }

    .feedback strong {
      display: block;
      margin-bottom: 6px;
    }

    .nav-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
      gap: 12px;
    }

    .nav-btn,
    .restart-btn {
      border: none;
      background: var(--primary);
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .nav-btn:hover,
    .restart-btn:hover {
      background: var(--primary-dark);
    }

    .nav-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .result-card {
      text-align: center;
      padding: 30px 22px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #ffffff;
    }

    .big-score {
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      font-weight: 900;
      color: var(--primary);
      margin: 14px 0;
    }

    .pass {
      color: var(--success);
      font-weight: 900;
    }

    .fail {
      color: var(--danger);
      font-weight: 900;
    }

    .review-list {
      margin-top: 22px;
      text-align: left;
      display: grid;
      gap: 10px;
    }

    .review-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #f8fafc;
    }

    .review-item strong {
      display: block;
      margin-bottom: 4px;
    }

    /* Spreadsheet display */
    .sheet-note {
      margin: 0 0 10px;
      color: var(--muted);
      font-weight: 700;
    }

    .sheet-box {
      overflow-x: auto;
      margin: 14px 0 22px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #ffffff;
      box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.02);
    }

    .sheet-table {
      width: 100%;
      min-width: 1050px;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .sheet-table caption {
      caption-side: top;
      text-align: left;
      padding: 10px;
      font-weight: 900;
      background: #eff6ff;
      color: #1e3a8a;
      border-bottom: 1px solid var(--border);
    }

    .sheet-table th,
    .sheet-table td {
      border: 1px solid var(--border);
      padding: 7px 8px;
      text-align: left;
      white-space: nowrap;
    }

    .sheet-table th {
      background: #eaf1ff;
      font-weight: 800;
    }

    .sheet-table td.num,
    .sheet-table th.num {
      text-align: right;
    }

    .formula-box {
      background: #0f172a;
      color: #ffffff;
      padding: 10px 12px;
      border-radius: 10px;
      font-family: Consolas, Monaco, monospace;
      font-size: 0.95rem;
      overflow-x: auto;
      margin: 10px 0 16px;
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      header,
      main,
      .top-row {
        padding-left: 16px;
        padding-right: 16px;
      }

      .progress-wrap {
        margin-left: 16px;
        margin-right: 16px;
      }

      .question-card {
        padding: 16px;
      }

      .answer-btn {
        padding: 13px;
      }

      .sheet-table {
        font-size: 0.78rem;
      }
    }
  </style>
</head>

        ],

      {
        topic: "Staff Hours Database",
        question: "Given Staff (Staff ID, first name, surname, telephone number, wage rate per hour), which field is the best primary key?",
        options: ["Staff ID", "First name", "Telephone number", "Wage rate per hour"],
        correct: "Staff ID",
        explanation: "Staff ID is intended to uniquely identify each staff record."

      {

        question: "Given Daily work (Daily work ID, Staff, date worked, hours worked), which field is the best primary key?",
        options: ["Daily work ID", "Staff", "Date worked", "Hours worked"],
        correct: "Daily work ID",
        explanation: "Daily work ID uniquely identifies each daily work record."

        options: [

          "It is a commission formula",

      },
      {

        options: ["Date/Time", "Long Text", "Currency", "Attachment"],

        explanation: "A date worked value should use a Date/Time data type so it can be sorted, filtered and used in date queries."
      },
      {
        topic: "Database Queries",
        question: "Which is a useful query for the staff hours database?",
        options: [
          "Total hours worked by each staff member for a selected week",
          "The colour of the website homepage only",
          "The exact order of OSI layers only",
          "The left margin of a CSS element only"
        ],
        correct: "Total hours worked by each staff member for a selected week",
        explanation: "This query would help calculate payroll or monitor staff workload."
      }
    ];

    const PASS_MARK = 50;

    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;
    let userAnswers = [];

    const app = document.getElementById("app");
    const questionCounter = document.getElementById("questionCounter");
    const scoreTracker = document.getElementById("scoreTracker");
    const progressBar = document.getElementById("progressBar");

    function shuffleArray(array) {
      const copy = [...array];

      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      return copy;
    }

    function updateTopBar() {
      const total = quizData.length;
      const current = Math.min(currentQuestionIndex + 1, total);

      questionCounter.textContent = currentQuestionIndex < total
        ? `Question ${current} of ${total}`
        : "Quiz complete";

      scoreTracker.textContent = `Score: ${score}`;
      progressBar.style.width = `${(currentQuestionIndex / total) * 100}%`;
    }

    function renderQuestion() {
      answered = false;
      updateTopBar();

      const q = quizData[currentQuestionIndex];
      const shuffledOptions = shuffleArray(q.options);

      app.innerHTML = "";

      const section = document.createElement("section");
      section.className = "question-card";
      section.setAttribute("aria-labelledby", "questionText");

      const topic = document.createElement("div");
      topic.className = "topic";
      topic.textContent = q.topic;

      const question = document.createElement("h2");
      question.className = "question-text";
      question.id = "questionText";
      question.textContent = q.question;

      const answers = document.createElement("div");
      answers.className = "answers";
      answers.setAttribute("role", "group");
      answers.setAttribute("aria-label", "Answer choices");

      shuffledOptions.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.type = "button";
        btn.textContent = `${String.fromCharCode(65 + index)}. ${option}`;
        btn.dataset.option = option;
        btn.addEventListener("click", () => selectAnswer(btn, q, answers));
        answers.appendChild(btn);
      });

      const feedback = document.createElement("div");
      feedback.className = "feedback";
      feedback.id = "feedback";
      feedback.setAttribute("aria-live", "polite");

      const nav = document.createElement("div");
      nav.className = "nav-row";

      const nextBtn = document.createElement("button");
      nextBtn.className = "nav-btn";
      nextBtn.type = "button";
      nextBtn.id = "nextBtn";
      nextBtn.textContent = currentQuestionIndex === quizData.length - 1
        ? "See results"
        : "Next question";
      nextBtn.disabled = true;

      nextBtn.addEventListener("click", () => {
        currentQuestionIndex++;

        if (currentQuestionIndex < quizData.length) {
          renderQuestion();
        } else {
          renderResults();
        }
      });

      nav.appendChild(nextBtn);

      section.appendChild(topic);

      if (q.exhibit === "wages") {
        const exhibit = document.createElement("div");
        exhibit.innerHTML = wagesSpreadsheetHTML;
        section.appendChild(exhibit);
      }

      section.appendChild(question);
      section.appendChild(answers);
      section.appendChild(feedback);
      section.appendChild(nav);

      app.appendChild(section);
    }

    function selectAnswer(button, q, answersContainer) {
      if (answered) return;

      answered = true;

      const selected = button.dataset.option;
      const isCorrect = selected === q.correct;

      if (isCorrect) score++;

      userAnswers.push({
        question: q.question,
        selected,
        correct: q.correct,
        isCorrect
      });

      const allButtons = answersContainer.querySelectorAll(".answer-btn");

      allButtons.forEach(btn => {
        btn.disabled = true;

        if (btn.dataset.option === q.correct) {
          btn.classList.add("correct");
        }

        if (btn === button && !isCorrect) {
          btn.classList.add("incorrect");
        }
      });

      const feedback = document.getElementById("feedback");
      feedback.classList.add("show");
      feedback.innerHTML = `
        <strong>${isCorrect ? "Correct." : "Not quite."}</strong>
        <span>${q.explanation}</span>
      `;

      document.getElementById("nextBtn").disabled = false;
      scoreTracker.textContent = `Score: ${score}`;
      progressBar.style.width = `${((currentQuestionIndex + 1) / quizData.length) * 100}%`;
    }

    function renderResults() {
      updateTopBar();
      progressBar.style.width = "100%";

      const total = quizData.length;
      const percentage = Math.round((score / total) * 100);
      const passed = percentage >= PASS_MARK;

      app.innerHTML = "";

      const result = document.createElement("section");
      result.className = "result-card";

      const heading = document.createElement("h2");
      heading.textContent = "Final Results";

      const bigScore = document.createElement("div");
      bigScore.className = "big-score";
      bigScore.textContent = `${percentage}%`;

      const detail = document.createElement("p");
      detail.innerHTML = `You scored <strong>${score}</strong> out of <strong>${total}</strong>.`;

      const passFail = document.createElement("p");
      passFail.className = passed ? "pass" : "fail";
      passFail.textContent = passed
        ? `Pass — you reached the ${PASS_MARK}% pass mark.`
        : `Fail — review the feedback and try again to reach ${PASS_MARK}%.`;

      const restart = document.createElement("button");
      restart.className = "restart-btn";
      restart.type = "button";
      restart.textContent = "Restart quiz";
      restart.addEventListener("click", restartQuiz);

      const review = document.createElement("div");
      review.className = "review-list";

      userAnswers.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "review-item";
        row.innerHTML = `
          <strong>Q${index + 1}: ${item.isCorrect ? "Correct" : "Incorrect"}</strong>
          <div>Your answer: ${escapeHTML(item.selected)}</div>
          ${item.isCorrect ? "" : `<div>Correct answer: ${escapeHTML(item.correct)}</div>`}
        `;
        review.appendChild(row);
      });

      result.appendChild(heading);
      result.appendChild(bigScore);
      result.appendChild(detail);
      result.appendChild(passFail);
      result.appendChild(restart);
      result.appendChild(review);

      app.appendChild(result);
    }

    function restartQuiz() {
      currentQuestionIndex = 0;
      score = 0;
      answered = false;
      userAnswers = [];
      renderQuestion();
    }

    function escapeHTML(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    renderQuestion();
  </script>
